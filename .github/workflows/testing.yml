name: Run tests

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Cache pip and Poetry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ matrix.python }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-poetry-${{ matrix.python }}-

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install "poetry>=2.0,<3"

      - name: Install project + dev dependencies with Poetry
        run: |
          poetry config virtualenvs.create false --local
          poetry install --no-interaction --no-ansi --with dev --extras compute

      - name: Run tests with coverage
        run: |
          poetry run pytest -q --junitxml=result.xml --cov=pya2l --cov-report=term-missing --cov-report=xml

      - name: Lint
        run: |
          poetry run ruff check .
          poetry run black --check .
          poetry run bandit -c bandit.yml -r pya2l -q
          poetry run mypy pya2l --ignore-missing-imports --no-error-summary

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report-${{ matrix.os }}-py${{ matrix.python }}
          path: result.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python }}
          path: coverage.xml
